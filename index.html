<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simulação minimalista do Pac-Man usando Vanilla JS.">
    <title>AlgorithMan</title>
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Configurações</h3>
            <button id="btnCloseSidebar" class="btn-close">&times;</button>
        </div>
        <div class="sidebar-content">
            <h4>Construtor</h4>
            <div class="control-group">
                <label for="mapSelect">Mapa:</label>
                <select id="mapSelect">
                    <option value="default">Mapa Padrão</option>
                    <option value="custom">Mapa Customizado</option>
                    <option value="astarkiller">Cenário: O Pântano (Fraqueza do A*)</option>
                    <option value="greedykiller">Cenário: Armadilha Côncava (Fraqueza da Gulosa)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="paintToolSelect">Ferramenta de Pintura:</label>
                <select id="paintToolSelect">
                    <option value="none" selected>🖱️ Navegar (Seguro)</option>
                    <option value="erase">Apagar (Chão)</option>
                    <option value="wall">Colocar Parede</option>
                    <option value="slow">Colocar Lama</option>
                    <option value="player">Posicionar Jogador</option>
                    <option value="enemy">Posicionar Inimigo</option>
                </select>
            </div>
            <div class="control-group">
                <label for="playerSpeedRange">Cooldown Jogador: <span id="playerSpeedValue">150</span>ms</label>
                <input type="range" id="playerSpeedRange" min="50" max="1000" step="50" value="150">
            </div>

            <h4>Inteligência Artificial</h4>
            <div class="control-group">
                <label for="algoSelect">Algoritmo:</label>
                <select id="algoSelect">
                    <option value="astar">A-Star (A*)</option>
                    <option value="greedy">Busca Gulosa (Greedy)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="heuristicSelect">Heurística:</label>
                <select id="heuristicSelect">
                    <option value="strong">Heurística Forte (Manhattan)</option>
                    <option value="weak">Heurística Fraca (Custo Zero)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="speedRange">Tickrate IA: <span id="speedValue">500</span>ms</label>
                <input type="range" id="speedRange" min="100" max="1000" step="100" value="500">
            </div>

            <button id="btnToggleTelemetry" class="mobile-only-btn btn-secondary"
                style="margin-top: 15px;">Mostrar/Ocultar Telemetria</button>
        </div>
    </aside>

    <button id="btnOpenSidebar" class="btn-floating" aria-label="Abrir Configurações">
        ⚙️ <span>Configurações</span>
    </button>

    <div class="app-wrapper">
        <h1 class="game-title">AlgorithMan</h1>

        <div class="action-buttons">
            <button id="btnPlay" class="btn-primary">PLAY</button>
            <button id="btnRestart" class="btn-secondary">Reiniciar</button>
        </div>

        <div class="board-wrapper">
            <div id="game-container">
                <!-- O grid será injetado aqui dinamicamente pelo ui.js -->
            </div>

            <div id="gameOverModal" class="modal hidden">
                <h2 style="background: linear-gradient(90deg, #ff3333, #ff6666); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    GAME OVER!</h2>
                <p style="margin-bottom: 2rem;">Você foi pego pelo Inimigo!</p>
                <button id="btnRetry" class="btn-secondary"
                    style="background: linear-gradient(135deg, #ff3333, #cc0000);">Tentar Novamente</button>
            </div>

            <div id="winModal" class="modal hidden">
                <h2 style="background: linear-gradient(90deg, #4CAF50, #8BC34A); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    VITÓRIA!</h2>
                <p style="margin-bottom: 2rem;">Estágio Concluído! Você venceu!</p>
                <button id="btnNext" class="btn-primary"
                    style="background: linear-gradient(135deg, #4CAF50, #2E7D32);">Continuar</button>
            </div>
        </div>

        <div id="telemetryPanel" class="telemetry-panel">
            <div class="tel-section tel-global">
                <div class="tel-title">[ PLACAR DA PARTIDA ]</div>
                <div>Nós Totais: <span id="telGlobalNodes">0</span></div>
                <div>Custo Acumulado: <span id="telGlobalCost">0</span></div>
                <div>Tempo Total: <span id="telGlobalTime">0.00</span>ms</div>
            </div>
            <div class="tel-divider"></div>
            <div class="tel-section tel-tick">
                <div class="tel-title">[ ÚLTIMO TICK ]</div>
                <div>Nós Expandidos: <span id="telNodes">0</span></div>
                <div>Custo da Rota: <span id="telCost">0</span></div>
                <div>Tempo: <span id="telTime">0.00</span>ms</div>
            </div>
        </div>

        <!-- Controles Virtuais (D-Pad) -->
        <div id="dpad" class="dpad">
            <button id="btnUp" class="dpad-btn up">▲</button>
            <button id="btnLeft" class="dpad-btn left">◄</button>
            <button id="btnDown" class="dpad-btn down">▼</button>
            <button id="btnRight" class="dpad-btn right">►</button>
        </div>
    </div>

    <!-- Script como module para importar os outros arquivos -->
    <script type="module" src="main.js"></script>
</body>

</html>
